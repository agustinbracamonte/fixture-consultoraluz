<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Torneo 2026 - By Consultora Luz</title>
    <meta name="description" content="Simula tu pronóstico del Mundial 2026. ¡Crea tu propio fixture y descubre quién será el campeón del mundo!">
    
    <!-- Open Graph / Redes Sociales -->
    <meta property="og:title" content="Simulador Torneo 2026 - By Consultora Luz">
    <meta property="og:description" content="Simula tu pronóstico del Mundial 2026. ¡Crea tu propio fixture y compártelo!">
    <meta property="og:image" content="https://raw.githubusercontent.com/agustinbracamonte/fixture-consultoraluz/main/og-image.png">
    <meta property="og:type" content="website">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Simulador Torneo 2026 - By Consultora Luz">
    <meta name="twitter:description" content="Simula tu pronóstico del Mundial 2026. ¡Crea tu propio fixture y compártelo!">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/agustinbracamonte/fixture-consultoraluz/main/og-image.png">

    <!-- Favicon dinámico (emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <!-- Badge con enlace funcional -->
        <a href="https://consultoraluz.com" target="_blank" class="sponsor-badge">By Consultora Luz 💡</a>
        
        <h1>COPA MUNDIAL 2026™</h1>
        <div class="subtitle">
            Horarios adaptados a tu región: 
            <select id="tz-select" class="tz-selector" onchange="changeTimezone(this.value)">
                <option value="America/Argentina/Buenos_Aires">🇦🇷 Argentina (UTC-3)</option>
                <option value="America/Montevideo">🇺🇾 Uruguay (UTC-3)</option>
                <option value="America/Santiago">🇨🇱 Chile (UTC-4)</option>
                <option value="America/Caracas">🇻🇪 Venezuela / 🇧🇴 Bolivia (UTC-4)</option>
                <option value="America/New_York">🇺🇸 Este USA / Miami / NY (UTC-4)</option>
                <option value="America/Bogota">🇨🇴 Colombia / 🇵🇪 Perú / 🇪🇨 Ecuador (UTC-5)</option>
                <option value="America/Mexico_City">🇲🇽 México CDMX (UTC-6)</option>
                <option value="America/Los_Angeles">🇺🇸 Oeste USA / Los Ángeles (UTC-7)</option>
                <option value="Europe/Madrid">🇪🇸 España (UTC+2)</option>
            </select>
        </div>
        <div class="mobile-hint">👉 Desliza lateralmente para ver el cuadro completo</div>
        <div class="controls">
            <button class="btn-clear" onclick="resetFixture()">🗑️ Limpiar Fixture</button>
        </div>
    </header>

    <nav id="mobile-tabs" class="mobile-tabs">
        <button class="tab-item active" onclick="scrollToColumn(0)">16vos.</button>
        <button class="tab-item" onclick="scrollToColumn(1)">8vos.</button>
        <button class="tab-item" onclick="scrollToColumn(2)">CF</button>
        <button class="tab-item" onclick="scrollToColumn(3)">SF</button>
        <button class="tab-item" onclick="scrollToColumn(4)">F</button>
    </nav>

    <div class="board-wrapper" id="scroll-area">
        <div class="bracket-container" id="bracket-board">
            <svg id="lines-svg"></svg>
            <div id="columns-wrapper" style="display: flex; width: 100%; justify-content: space-between; gap: 40px; z-index: 2;">
                <!-- Columnas renderizadas dinámicamente -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
